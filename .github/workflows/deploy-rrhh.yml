name: deploy-rrhh

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        shell: bash
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "OWNER_LC=${OWNER_LC}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=ghcr.io/${OWNER_LC}/rrhhmini-backend:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER_LC}/rrhhmini-frontend:${GITHUB_SHA}" >> "$GITHUB_ENV"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "STACK_NAME=rrhhmini" >> "$GITHUB_ENV"
            echo "REMOTE_ENV_FILE=/opt/deploy/rrhhmini/.env-prod" >> "$GITHUB_ENV"
          else
            echo "STACK_NAME=rrhhmini-dev" >> "$GITHUB_ENV"
            echo "REMOTE_ENV_FILE=/opt/deploy/rrhhmini/.env-dev" >> "$GITHUB_ENV"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}
          build-args: |
            NEXT_PUBLIC_API_URL=

      - name: Install SSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload stack file
        run: |
          scp -P "${{ secrets.VPS_PORT }}" -i ~/.ssh/id_ed25519 \
            stack.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/deploy/rrhhmini/stack.yml"

      - name: Deploy to Swarm
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<EOF
          set -e
          cd /opt/deploy/rrhhmini

          set -a
          . "${REMOTE_ENV_FILE}"
          set +a

          export BACKEND_IMAGE="${BACKEND_IMAGE}"
          export FRONTEND_IMAGE="${FRONTEND_IMAGE}"

          echo '${GHCR_PAT}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin
          docker stack deploy --with-registry-auth -c stack.yml ${STACK_NAME}
          docker logout ghcr.io || true
          EOF