version: '3.8'

services:
  backend_api:
    image: rrhh-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DB_HOST=host.docker.internal
      - DB_PORT=${DB_PORT:-3306}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE:-rrhh_moderno}
      - DB_SYNC=false
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - MAIL_FROM=${MAIL_FROM}
      - HIK_API_BASE=${HIK_API_BASE}
      - HIK_API_KEY=${HIK_API_KEY}
      - HIK_POLL_INTERVAL_MS=${HIK_POLL_INTERVAL_MS:-30000}
      - HIK_POLL_LIMIT=${HIK_POLL_LIMIT:-200}
    # Permite al contenedor acceder al MySQL del host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - web
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rrhh-api.rule=Host(`rrhh.mmatdev.com`) && PathPrefix(`/api`)"
        - "traefik.http.routers.rrhh-api.entrypoints=websecure"
        - "traefik.http.routers.rrhh-api.tls.certresolver=letsencrypt"
        - "traefik.http.services.rrhh-api.loadbalancer.server.port=8000"
        # Strip /api prefix before forwarding to backend
        - "traefik.http.middlewares.rrhh-strip-api.stripprefix.prefixes=/api"
        - "traefik.http.routers.rrhh-api.middlewares=rrhh-strip-api"

  frontend_web:
    image: rrhh-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vacío → usa /api por defecto (Traefik rutea al backend)
        NEXT_PUBLIC_API_URL: ""
    networks:
      - web
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.rrhh-frontend.rule=Host(`rrhh.mmatdev.com`)"
        - "traefik.http.routers.rrhh-frontend.entrypoints=websecure"
        - "traefik.http.routers.rrhh-frontend.tls.certresolver=letsencrypt"
        - "traefik.http.services.rrhh-frontend.loadbalancer.server.port=3000"
        # Prioridad más baja que /api para que no capture las rutas del backend
        - "traefik.http.routers.rrhh-frontend.priority=1"

networks:
  web:
    external: true
  internal:
    driver: overlay
